name: Use Repository Secrets

on:
    push:
        branches:
            - main

jobs:
    validate-secrets:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Confirm secrets are available
              run: |
                  # This step demonstrates secret consumption without printing them.
                  # If the secret is missing, the `if` fails and the job errors.

                  if [ -z "${{ secrets.ENV_GOOGLE_API_KEY }}" ]; then
                    echo "ERROR: ENV_GOOGLE_API_KEY is not set!"
                    exit 1
                  fi

                  # Use the secret in a safe way (e.g., pass into a tool or set as env var)
                  echo "Secret is present and the job can continue."
              env:
                  MY_SECRET: ${{ secrets.ENV_GOOGLE_API_KEY }}
